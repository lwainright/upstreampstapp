[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

# ── Security Headers ──────────────────────────────────────────
# Applied globally to all routes

[[headers]]
  for = "/*"
  [headers.values]
    # Prevent clickjacking
    X-Frame-Options = "DENY"
    # Prevent MIME sniffing
    X-Content-Type-Options = "nosniff"
    # Control referrer information
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Permissions policy -- disable unused browser features
    Permissions-Policy = "geolocation=(), microphone=(self), camera=(self), payment=(), usb=(), bluetooth=()"
    # Content Security Policy
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://nyc.cloud.appwrite.io; connect-src 'self' https://nyc.cloud.appwrite.io https://api.anthropic.com https://api.tavily.com wss://nyc.cloud.appwrite.io; worker-src 'self'; manifest-src 'self'"
    # HSTS -- force HTTPS
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

# ── Cache Control ─────────────────────────────────────────────

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0"
    Pragma = "no-cache"
    Surrogate-Control = "no-store"
    Expires = "0"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0"
    Pragma = "no-cache"
    Expires = "0"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, max-age=0"
    Pragma = "no-cache"
    Expires = "0"

# ── Redirects ─────────────────────────────────────────────────

[[redirects]]
  from = "/icons/*"
  to = "/icons/:splat"
  status = 200

[[redirects]]
  from = "/service-worker.js"
  to = "/service-worker.js"
  status = 200

[[redirects]]
  from = "/manifest.json"
  to = "/manifest.json"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ── Functions ─────────────────────────────────────────────────

[functions]
  node_bundler = "zisi"
