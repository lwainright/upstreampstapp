<script src="/upstreampstapp/anthropic.js"></script>

<!-- Load system prompt + CIT modules -->
<script type="module">
  import { SYSTEM_PROMPT } from "./config/systemPrompt.js";
  import { CIT_MODULES } from "./data/citModules.js";

  window.UPSTREAM_SYSTEM_PROMPT = SYSTEM_PROMPT;
  window.UPSTREAM_CIT = CIT_MODULES;
</script>

<script>
  let typingEnabled = (localStorage.getItem("typingIndicator") === "on");
  let typingTimer = null;
  let typingBubble = null;
  let sending = false; // prevents double-send

  const messagesDiv = document.getElementById("messages");
  const input = document.getElementById("chatInput");
  const sendBtn = document.getElementById("sendBtn");

  // Add a message bubble with fade-in
  function addMessage(text, sender) {
    const div = document.createElement("div");
    div.classList.add("msg", sender);
    div.style.opacity = 0;
    div.textContent = text;

    messagesDiv.appendChild(div);

    requestAnimationFrame(() => {
      div.style.transition = "opacity 0.3s ease";
      div.style.opacity = 1;
    });

    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }

  // Typing indicator
  function showTypingIndicator() {
    typingBubble = document.createElement("div");
    typingBubble.classList.add("msg", "ai", "typing");
    typingBubble.textContent = "…";
    messagesDiv.appendChild(typingBubble);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }

  function hideTypingIndicator() {
    if (typingBubble) {
      typingBubble.remove();
      typingBubble = null;
    }
  }

  // Build CIT-informed prompt
  function buildPrompt(userText) {
    return `
${window.UPSTREAM_SYSTEM_PROMPT}

User: ${userText}
Responder:
`;
  }

  // Handle sending a message
  async function handleSend() {
    const text = input.value.trim();
    if (!text || sending) return;

    sending = true;
    addMessage(text, "user");
    input.value = "";

    // Typing indicator delay
    if (typingEnabled) {
      typingTimer = setTimeout(() => {
        showTypingIndicator();
      }, 400);
    }

    const fullPrompt = buildPrompt(text);

    let reply;
    try {
      reply = await sendToAnthropic(fullPrompt);
    } catch (err) {
      reply = "I'm here with you. Something glitched, but you're not alone.";
    }

    clearTimeout(typingTimer);
    if (typingEnabled) hideTypingIndicator();

    addMessage(reply, "ai");
    sending = false;
  }

  sendBtn.addEventListener("click", handleSend);

  input.addEventListener("keypress", e => {
    if (e.key === "Enter") handleSend();
  });

  // Cleanup on page unload
  window.addEventListener("beforeunload", () => {
    clearTimeout(typingTimer);
    sending = false;
  });
</script>
