let typingEnabled = (localStorage.getItem("typingIndicator") === "on");
let typingTimer = null;

<script src="/upstreampstapp/anthropic.js"></script>

<!-- Load system prompt + CIT modules -->
<script type="module">
  import { SYSTEM_PROMPT } from "./config/systemPrompt.js";
  import { CIT_MODULES } from "./data/citModules.js";

  // Expose to the global window so the main script can use them
  window.UPSTREAM_SYSTEM_PROMPT = SYSTEM_PROMPT;
  window.UPSTREAM_CIT = CIT_MODULES;
</script>

<script>
  const messagesDiv = document.getElementById("messages");
  const input = document.getElementById("chatInput");
  const sendBtn = document.getElementById("sendBtn");

  // Add a message bubble to the chat window
  function addMessage(text, sender) {
    const div = document.createElement("div");
    div.classList.add("msg", sender);
    div.textContent = text;
    messagesDiv.appendChild(div);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }

  // Build the CIT‑informed prompt
  function buildPrompt(userText) {
    return `
${window.UPSTREAM_SYSTEM_PROMPT}

User: ${userText}
Responder:
`;
  }

  // Handle sending a message
  async function handleSend() {
    const text = input.value.trim();
    if (!text) return;

    // Show user message
    addMessage(text, "user");
    input.value = "";

    // Build CIT‑informed prompt
    const fullPrompt = buildPrompt(text);

    // Get AI response through anthropic.js
    let reply;
    try {
      reply = await sendToAnthropic(fullPrompt);
    } catch (err) {
      reply = "I'm here with you. Something glitched, but you're not alone.";
    }

    addMessage(reply, "ai");
  }

  // Button click
  sendBtn.addEventListener("click", handleSend);

  // Enter key
  input.addEventListener("keypress", e => {
    if (e.key === "Enter") handleSend();
  });
</script>
