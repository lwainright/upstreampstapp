<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>4‑7‑8 Breathing – Upstream</title>
  <link rel="stylesheet" href="/style.css">
  <meta name="theme-color" content="#38bdf8">
  <meta name="description" content="4-7-8 breathing exercise for stress relief and relaxation">
  <style>
    /* Container for breathing circle */
    .breathing-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      padding: 20px;
    }
    
    /* Breathing circle animation */
    .breathing-circle {
      width: 200px;
      height: 200px;
      margin: 40px auto;
      border-radius: 50%;
      background: linear-gradient(135deg, #38bdf8 0%, #7dd3fc 100%); /* ENHANCED: Gradient */
      opacity: 0.3; /* CHANGED: Slightly more visible */
      transition: transform 4s ease-in-out, opacity 0.3s ease; /* ADDED: Opacity transition */
      box-shadow: 0 0 40px rgba(56, 189, 248, 0.3); /* ADDED: Glow effect */
      position: relative;
    }
    
    /* Pulse effect when active */
    .breathing-circle.active {
      opacity: 0.5; /* ADDED: More visible when active */
    }
    
    /* Inner circle for visual depth */
    .breathing-circle::before {
      content: '';
      position: absolute;
      inset: 20px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      transition: transform 4s ease-in-out;
    }
    
    /* Breathing instruction text */
    .breathing-text {
      text-align: center;
      font-size: 1.8rem; /* CHANGED: Larger text */
      font-weight: 700; /* ADDED: Bold */
      margin-top: 30px; /* CHANGED: More spacing */
      opacity: 0.9;
      color: #dde8f4; /* ADDED: Light text color */
      min-height: 2.5rem; /* ADDED: Prevent layout shift */
      transition: opacity 0.3s ease; /* ADDED: Smooth fade */
    }
    
    /* Countdown timer */
    .breathing-timer {
      text-align: center;
      font-size: 3rem; /* ADDED: Large countdown */
      font-weight: 800;
      color: #38bdf8;
      margin-top: 10px;
      min-height: 3.5rem;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    
    .breathing-timer.visible {
      opacity: 1;
    }
    
    /* Cycle counter */
    .cycle-counter {
      text-align: center;
      font-size: 0.9rem;
      color: #8099b0;
      margin-top: 10px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    
    .cycle-counter.visible {
      opacity: 1;
    }
    
    /* Button container */
    .button-container {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 40px;
      flex-wrap: wrap; /* ADDED: Wrap on small screens */
    }
    
    /* Buttons */
    .button-primary,
    .button-secondary {
      padding: 14px 28px; /* ENHANCED: Bigger touch targets */
      font-size: 1rem;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s ease;
      min-width: 120px; /* ADDED: Consistent width */
    }
    
    .button-primary {
      background: #38bdf8;
      color: #060e1b;
    }
    
    .button-primary:hover {
      background: #7dd3fc;
      transform: translateY(-2px); /* ADDED: Lift on hover */
      box-shadow: 0 4px 12px rgba(56, 189, 248, 0.4);
    }
    
    .button-primary:disabled {
      background: #64748b;
      cursor: not-allowed;
      opacity: 0.5;
    }
    
    .button-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: #dde8f4;
      border: 1.5px solid rgba(255, 255, 255, 0.2);
    }
    
    .button-secondary:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.3);
    }
    
    .button-secondary:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
    
    /* Instructions card */
    .instructions-card {
      background: rgba(56, 189, 248, 0.08);
      border: 1px solid rgba(56, 189, 248, 0.2);
      border-radius: 12px;
      padding: 16px 20px;
      margin: 30px auto;
      max-width: 500px;
      text-align: center;
    }
    
    .instructions-card h3 {
      font-size: 1rem;
      color: #7dd3fc;
      margin: 0 0 8px 0;
      font-weight: 600;
    }
    
    .instructions-card p {
      font-size: 0.9rem;
      color: #8099b0;
      margin: 0;
      line-height: 1.6;
    }
    
    /* Responsive */
    @media (max-width: 480px) {
      .breathing-circle {
        width: 160px;
        height: 160px;
      }
      
      .breathing-text {
        font-size: 1.4rem;
      }
      
      .breathing-timer {
        font-size: 2.5rem;
      }
      
      .button-primary,
      .button-secondary {
        min-width: 100px;
        padding: 12px 24px;
      }
    }
  </style>
</head>
<body>
  <header class="app-header">
    <a href="/tools.html" class="back-button">← Tools</a>
    <h1>4‑7‑8 Breathing</h1>
    <p class="subtitle">A calming pattern to settle your system</p>
  </header>
  
  <main class="page-content">
    <!-- Instructions -->
    <div class="instructions-card">
      <h3>How it works:</h3>
      <p>Inhale for 4 seconds, hold for 7 seconds, exhale for 8 seconds. Repeat for 3-5 cycles.</p>
    </div>
    
    <!-- Breathing animation -->
    <div class="breathing-container">
      <div class="breathing-circle" id="circle"></div>
      <div class="breathing-text" id="breathingText">Press Start</div>
      <div class="breathing-timer" id="timer"></div>
      <div class="cycle-counter" id="cycleCounter"></div>
    </div>
    
    <!-- Controls -->
    <div class="button-container">
      <button class="button-primary" id="startBtn">Start</button>
      <button class="button-secondary" id="stopBtn" disabled>Stop</button>
      <button class="button-secondary" id="resetBtn" disabled>Reset</button>
    </div>
  </main>
  
  <script>
    // DOM elements
    const circle = document.getElementById("circle");
    const text = document.getElementById("breathingText");
    const timerDisplay = document.getElementById("timer");
    const cycleCounter = document.getElementById("cycleCounter");
    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");
    const resetBtn = document.getElementById("resetBtn");
    
    // State
    let interval = null;
    let countdownInterval = null;
    let step = 0;
    let cycleCount = 0;
    let isPaused = false;
    
    // 4-7-8 timing pattern
    const steps = [
      { text: "Inhale slowly…", scale: 1.4, duration: 4000 },
      { text: "Hold it…", scale: 1.4, duration: 7000 },
      { text: "Exhale fully…", scale: 1.0, duration: 8000 }
    ];
    
    // Run breathing step
    function runStep() {
      const current = steps[step];
      
      // Update text
      text.textContent = current.text;
      
      // Animate circle
      circle.classList.add('active');
      circle.style.transition = `transform ${current.duration}ms ease-in-out`;
      circle.style.transform = `scale(${current.scale})`;
      
      // Start countdown
      startCountdown(current.duration / 1000);
      
      // Next step
      const nextDuration = current.duration;
      step = (step + 1) % steps.length;
      
      // Increment cycle after exhale
      if (step === 0) {
        cycleCount++;
        updateCycleCounter();
      }
      
      // Schedule next step
      interval = setTimeout(runStep, nextDuration);
    }
    
    // Countdown timer
    function startCountdown(seconds) {
      let remaining = Math.ceil(seconds);
      timerDisplay.classList.add('visible');
      timerDisplay.textContent = remaining;
      
      clearInterval(countdownInterval);
      countdownInterval = setInterval(() => {
        remaining--;
        if (remaining > 0) {
          timerDisplay.textContent = remaining;
        } else {
          timerDisplay.textContent = '';
        }
      }, 1000);
    }
    
    // Update cycle counter
    function updateCycleCounter() {
      cycleCounter.textContent = `Cycle ${cycleCount} completed`;
      cycleCounter.classList.add('visible');
    }
    
    // Start button
    startBtn.addEventListener("click", () => {
      if (!interval) {
        step = 0;
        if (cycleCount === 0) {
          // First start
          runStep();
        } else {
          // Resume after pause
          runStep();
        }
        
        // Update button states
        startBtn.disabled = true;
        stopBtn.disabled = false;
        resetBtn.disabled = false;
        startBtn.textContent = 'Running...';
      }
    });
    
    // Stop/Pause button
    stopBtn.addEventListener("click", () => {
      clearTimeout(interval);
      clearInterval(countdownInterval);
      interval = null;
      
      // Update UI
      text.textContent = "Paused";
      timerDisplay.textContent = '';
      timerDisplay.classList.remove('visible');
      circle.classList.remove('active');
      
      // Update button states
      startBtn.disabled = false;
      stopBtn.disabled = true;
      startBtn.textContent = 'Resume';
      
      isPaused = true;
    });
    
    // Reset button
    resetBtn.addEventListener("click", () => {
      clearTimeout(interval);
      clearInterval(countdownInterval);
      interval = null;
      step = 0;
      cycleCount = 0;
      isPaused = false;
      
      // Reset UI
      text.textContent = "Press Start";
      timerDisplay.textContent = '';
      timerDisplay.classList.remove('visible');
      cycleCounter.textContent = '';
      cycleCounter.classList.remove('visible');
      circle.style.transform = "scale(1)";
      circle.classList.remove('active');
      
      // Update button states
      startBtn.disabled = false;
      stopBtn.disabled = true;
      resetBtn.disabled = true;
      startBtn.textContent = 'Start';
    });
    
    // Cleanup on page unload
    window.addEventListener('beforeunload', () => {
      clearTimeout(interval);
      clearInterval(countdownInterval);
    });
  </script>
</body>
</html>
