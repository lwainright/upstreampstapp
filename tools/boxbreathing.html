<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Box Breathing – Upstream</title>
  <link rel="stylesheet" href="/style.css">
  <meta name="theme-color" content="#38bdf8">
  <meta name="description" content="Box breathing (4-4-4-4) tactical breathing exercise">
  <style>
    /* Container */
    .breathing-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      padding: 20px;
    }
    
    /* Animated box */
    .breathing-box {
      width: 200px;
      height: 200px;
      margin: 40px auto;
      border: 4px solid #38bdf8;
      border-radius: 8px;
      position: relative;
      background: linear-gradient(135deg, rgba(56, 189, 248, 0.1) 0%, rgba(125, 211, 252, 0.05) 100%);
      box-shadow: 0 0 30px rgba(56, 189, 248, 0.3);
      transition: transform 4s ease-in-out, box-shadow 4s ease-in-out;
    }
    
    /* Moving dot indicator */
    .breathing-dot {
      width: 16px;
      height: 16px;
      background: #38bdf8;
      border-radius: 50%;
      position: absolute;
      top: -8px;
      left: -8px;
      box-shadow: 0 0 15px rgba(56, 189, 248, 0.8);
      transition: all 4s ease-in-out;
    }
    
    /* Dot positions for each step */
    .breathing-dot.top-left { top: -8px; left: -8px; }
    .breathing-dot.top-right { top: -8px; right: -8px; }
    .breathing-dot.bottom-right { bottom: -8px; right: -8px; }
    .breathing-dot.bottom-left { bottom: -8px; left: -8px; }
    
    /* Center text overlay */
    .box-center-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 3rem;
      font-weight: 800;
      color: #38bdf8;
      text-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    
    .box-center-text.visible {
      opacity: 1;
    }
    
    /* Breathing instruction text */
    .breathing-text {
      text-align: center;
      font-size: 1.8rem;
      font-weight: 700;
      margin-top: 30px;
      color: #dde8f4;
      opacity: 0.9;
      transition: opacity 0.4s ease;
      min-height: 2.5rem;
    }
    
    /* Countdown timer */
    .breathing-timer {
      text-align: center;
      font-size: 3rem;
      font-weight: 800;
      color: #38bdf8;
      margin-top: 10px;
      min-height: 3.5rem;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    
    .breathing-timer.visible {
      opacity: 1;
    }
    
    /* Cycle counter */
    .cycle-counter {
      text-align: center;
      font-size: 0.9rem;
      color: #8099b0;
      margin-top: 10px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    
    .cycle-counter.visible {
      opacity: 1;
    }
    
    /* Instructions card */
    .instructions-card {
      background: rgba(56, 189, 248, 0.08);
      border: 1px solid rgba(56, 189, 248, 0.2);
      border-radius: 12px;
      padding: 16px 20px;
      margin: 20px auto 30px;
      max-width: 500px;
      text-align: center;
    }
    
    .instructions-card h3 {
      font-size: 1rem;
      color: #7dd3fc;
      margin: 0 0 8px 0;
      font-weight: 600;
    }
    
    .instructions-card p {
      font-size: 0.9rem;
      color: #8099b0;
      margin: 0;
      line-height: 1.6;
    }
    
    /* Button container */
    .button-container {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 40px;
      flex-wrap: wrap;
    }
    
    /* Buttons */
    .button-primary,
    .button-secondary {
      padding: 14px 28px;
      font-size: 1rem;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s ease;
      min-width: 120px;
    }
    
    .button-primary {
      background: #38bdf8;
      color: #060e1b;
    }
    
    .button-primary:hover {
      background: #7dd3fc;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(56, 189, 248, 0.4);
    }
    
    .button-primary:disabled {
      background: #64748b;
      cursor: not-allowed;
      opacity: 0.5;
    }
    
    .button-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: #dde8f4;
      border: 1.5px solid rgba(255, 255, 255, 0.2);
    }
    
    .button-secondary:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.3);
    }
    
    .button-secondary:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
    
    /* Responsive */
    @media (max-width: 480px) {
      .breathing-box {
        width: 160px;
        height: 160px;
      }
      
      .breathing-text {
        font-size: 1.4rem;
      }
      
      .breathing-timer {
        font-size: 2.5rem;
      }
      
      .box-center-text {
        font-size: 2.5rem;
      }
    }
  </style>
</head>
<body>
  <header class="app-header">
    <a href="/tools.html" class="back-button">← Tools</a>
    <h1>Box Breathing</h1>
    <p class="subtitle">4 seconds in • 4 hold • 4 out • 4 hold</p>
  </header>
  
  <main class="page-content">
    <!-- Instructions -->
    <div class="instructions-card">
      <h3>Tactical breathing pattern:</h3>
      <p>Breathe in a square: 4 seconds each side. Used by military and first responders to stay calm under pressure.</p>
    </div>
    
    <!-- Breathing animation -->
    <div class="breathing-container">
      <div class="breathing-box" id="box">
        <div class="breathing-dot" id="dot"></div>
        <div class="box-center-text" id="centerText"></div>
      </div>
      <div class="breathing-text" id="breathingText">Press Start</div>
      <div class="breathing-timer" id="timer"></div>
      <div class="cycle-counter" id="cycleCounter"></div>
    </div>
    
    <!-- Controls -->
    <div class="button-container">
      <button class="button-primary" id="startBtn">Start</button>
      <button class="button-secondary" id="stopBtn" disabled>Stop</button>
      <button class="button-secondary" id="resetBtn" disabled>Reset</button>
    </div>
  </main>
  
  <script>
    // DOM elements
    const box = document.getElementById("box");
    const dot = document.getElementById("dot");
    const text = document.getElementById("breathingText");
    const centerText = document.getElementById("centerText");
    const timerDisplay = document.getElementById("timer");
    const cycleCounter = document.getElementById("cycleCounter");
    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");
    const resetBtn = document.getElementById("resetBtn");
    
    // State
    let interval = null;
    let countdownInterval = null;
    let step = 0;
    let cycleCount = 0;
    
    // Box breathing steps (4-4-4-4 pattern)
    const steps = [
      { 
        text: "Breathe in…", 
        scale: 1.2, 
        dotPosition: "top-right",
        centerNumber: null
      },
      { 
        text: "Hold it…", 
        scale: 1.2, 
        dotPosition: "bottom-right",
        centerNumber: null
      },
      { 
        text: "Breathe out…", 
        scale: 1.0, 
        dotPosition: "bottom-left",
        centerNumber: null
      },
      { 
        text: "Hold…", 
        scale: 1.0, 
        dotPosition: "top-left",
        centerNumber: null
      }
    ];
    
    // Run breathing step
    function runBreathing() {
      const current = steps[step];
      
      // Fade text smoothly
      text.style.opacity = 0;
      setTimeout(() => {
        text.textContent = current.text;
        text.style.opacity = 1;
      }, 200);
      
      // Animate box
      box.style.transform = `scale(${current.scale})`;
      if (current.scale > 1) {
        box.style.boxShadow = "0 0 50px rgba(56, 189, 248, 0.5)";
      } else {
        box.style.boxShadow = "0 0 30px rgba(56, 189, 248, 0.3)";
      }
      
      // Move dot around box
      dot.className = `breathing-dot ${current.dotPosition}`;
      
      // Start countdown
      startCountdown(4);
      
      // Next step
      step = (step + 1) % steps.length;
      
      // Increment cycle after full box (4 steps)
      if (step === 0) {
        cycleCount++;
        updateCycleCounter();
      }
    }
    
    // Countdown timer
    function startCountdown(seconds) {
      let remaining = seconds;
      timerDisplay.classList.add('visible');
      centerText.classList.add('visible');
      
      timerDisplay.textContent = remaining;
      centerText.textContent = remaining;
      
      clearInterval(countdownInterval);
      countdownInterval = setInterval(() => {
        remaining--;
        if (remaining > 0) {
          timerDisplay.textContent = remaining;
          centerText.textContent = remaining;
        } else {
          timerDisplay.textContent = '';
          centerText.textContent = '';
          centerText.classList.remove('visible');
        }
      }, 1000);
    }
    
    // Update cycle counter
    function updateCycleCounter() {
      cycleCounter.textContent = `${cycleCount} cycle${cycleCount !== 1 ? 's' : ''} completed`;
      cycleCounter.classList.add('visible');
    }
    
    // Start button
    startBtn.addEventListener("click", () => {
      if (!interval) {
        step = 0;
        runBreathing();
        interval = setInterval(runBreathing, 4000);
        
        // Update button states
        startBtn.disabled = true;
        stopBtn.disabled = false;
        resetBtn.disabled = false;
        startBtn.textContent = 'Running...';
      }
    });
    
    // Stop button
    stopBtn.addEventListener("click", () => {
      clearInterval(interval);
      clearInterval(countdownInterval);
      interval = null;
      
      // Update UI
      text.textContent = "Paused";
      timerDisplay.textContent = '';
      timerDisplay.classList.remove('visible');
      centerText.textContent = '';
      centerText.classList.remove('visible');
      
      // Update button states
      startBtn.disabled = false;
      stopBtn.disabled = true;
      startBtn.textContent = 'Resume';
    });
    
    // Reset button
    resetBtn.addEventListener("click", () => {
      clearInterval(interval);
      clearInterval(countdownInterval);
      interval = null;
      step = 0;
      cycleCount = 0;
      
      // Reset UI
      text.textContent = "Press Start";
      timerDisplay.textContent = '';
      timerDisplay.classList.remove('visible');
      centerText.textContent = '';
      centerText.classList.remove('visible');
      cycleCounter.textContent = '';
      cycleCounter.classList.remove('visible');
      box.style.transform = "scale(1)";
      box.style.boxShadow = "0 0 30px rgba(56, 189, 248, 0.3)";
      dot.className = "breathing-dot top-left";
      
      // Update button states
      startBtn.disabled = false;
      stopBtn.disabled = true;
      resetBtn.disabled = true;
      startBtn.textContent = 'Start';
    });
    
    // Safety cleanup when leaving the page
    window.addEventListener("beforeunload", () => {
      clearInterval(interval);
      clearInterval(countdownInterval);
    });
  </script>
</body>
</html>
