<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Box Breathing – Upstream</title>

  <link rel="stylesheet" href="/upstreampstapp/style.css">
  <meta name="theme-color" content="#2E75B6">

  <style>
    /* Breathing circle */
    .breathing-circle {
      width: 200px;
      height: 200px;
      margin: 40px auto;
      border-radius: 50%;
      background: var(--color-primary);
      opacity: 0.25;
      transition: transform 4s ease-in-out;
    }

    .breathing-text {
      text-align: center;
      font-size: 1.4rem;
      margin-top: 20px;
      opacity: 0.9;
    }

    .centered {
      text-align: center;
      margin-top: 30px;
    }
  </style>
</head>

<body>

  <header class="app-header">
    <a href="/upstreampstapp/tools.html" class="back-button">← Tools</a>
    <h1>Box Breathing</h1>
    <p class="subtitle">4 seconds in • 4 hold • 4 out • 4 hold</p>
  </header>

  <main class="page-content">

    <div class="breathing-circle" id="circle"></div>
    <div class="breathing-text" id="breathingText">Press Start</div>

    <div class="centered">
      <button class="button-primary" id="startBtn">Start</button>
      <button class="button-secondary" id="stopBtn">Stop</button>
    </div>

  </main>

  <script>
    const circle = document.getElementById("circle");
    const text = document.getElementById("breathingText");
    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");

    let interval = null;
    let step = 0;

    const steps = [
      { text: "Inhale…", scale: 1.3 },
      { text: "Hold…", scale: 1.3 },
      { text: "Exhale…", scale: 1.0 },
      { text: "Hold…", scale: 1.0 }
    ];

    function runBreathing() {
      const current = steps[step];
      text.textContent = current.text;
      circle.style.transform = `scale(${current.scale})`;

      step = (step + 1) % steps.length;
    }

    startBtn.addEventListener("click", () => {
      if (!interval) {
        runBreathing();
        interval = setInterval(runBreathing, 4000);
      }
    });

    stopBtn.addEventListener("click", () => {
      clearInterval(interval);
      interval = null;
      text.textContent = "Press Start";
      circle.style.transform = "scale(1)";
    });
  </script>

</body>
</html>
