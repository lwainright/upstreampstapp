<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Resources – Upstream</title>

  <!-- Manifest -->
  <link rel="manifest" href="/upstreampstapp/manifest.json">

  <!-- PWA / iOS -->
  <meta name="theme-color" content="#2E75B6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">

  <!-- Styles -->
  <link rel="stylesheet" href="/upstreampstapp/style.css">

  <style>
    .resource-card {
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    .resource-link {
      color: var(--color-primary);
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <header class="app-header">
    <a href="/upstreampstapp/index.html" class="back-button">← Home</a>
    <h1>Resources</h1>
    <p class="subtitle">Responder & veteran support you can trust</p>
  </header>

  <main class="page-content" id="resourceContainer">

    <p class="card-text" style="margin-bottom: 20px;">
      These resources are confidential and responder‑friendly.  
      Nothing is routed through the app — calls and texts go directly to the provider.
    </p>

  </main>

  <script src="/upstreampstapp/app.js"></script>

  <script>
    const container = document.getElementById("resourceContainer");

    function createResourceCard(groupLabel, items) {
      const card = document.createElement("section");
      card.classList.add("card", "resource-card");

      let listItems = items.map(item => {
        const link = item.link
          ? `<a class="resource-link" href="${item.link}" target="_blank">${item.link}</a>`
          : "";

        const notes = item.notes
          ? `<div style="opacity:0.7; font-size:0.85rem; margin-top:4px;">${item.notes}</div>`
          : "";

        return `
          <li>
            <strong>${item.label}</strong><br>
            <span style="opacity:0.85;">${item.description}</span><br>
            ${link}
            ${notes}
          </li>
        `;
      }).join("");

      card.innerHTML = `
        <h2>${groupLabel}</h2>
        <ul class="resource-list">${listItems}</ul>
      `;

      requestAnimationFrame(() => {
        card.style.opacity = 1;
      });

      return card;
    }

    function loadResources() {
      const data = window.AGENCY_DATA;

      if (!data || !data.resources || data.resources.length === 0) {
        container.innerHTML += `
          <section class="card resource-card" style="opacity:1;">
            <h2>No Resources Found</h2>
            <p class="card-text">Your agency has not added resources yet.</p>
          </section>
        `;
        return;
      }

      // Group by categoryLabel
      const groups = {};
      data.resources.forEach(r => {
        const group = r.categoryLabel || "General Resources";
        if (!groups[group]) groups[group] = [];
        groups[group].push(r);
      });

      // Render each group
      Object.keys(groups).forEach(group => {
        container.appendChild(createResourceCard(group, groups[group]));
      });

      // Add local resources (from Settings)
      const local = localStorage.getItem("localResources");
      if (local && local.trim() !== "") {
        container.appendChild(createResourceCard("Your Local Resources", [
          {
            label: "Local Notes",
            description: local.replace(/\n/g, "<br>"),
            link: "",
            notes: ""
          }
        ]));
      }
    }

    document.addEventListener("DOMContentLoaded", loadResources);
  </script>

</body>
</html>
